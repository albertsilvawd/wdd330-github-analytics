<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Analytics Dashboard</title>
    <link rel="stylesheet" href="/src/css/style.css" />
    <script src="/src/js/main.js" type="module"></script>
</head>

<body>
    <header id="main-header"></header>
    <main id="main-content">
        <section class="hero">
            <h1>GitHub Analytics Dashboard</h1>
            <p>Search for any GitHub profile and visualize their stats</p>
            <div class="search-container">
                <input type="text" id="username-input" placeholder="Enter a GitHub username..." autocomplete="off" />
                <button id="search-btn">Search</button>
            </div>
        </section>
        <section id="dashboard" class="dashboard hidden"></section>
    </main>
    <footer id="main-footer"></footer>
</body>

</html>
